; Gentis firmware — PlatformIO project
;
; Phase 1 (TC-0002): brain-only. Builds the vendored WireClaw core for the
; on-hand board (ESP32-C6-WROOM-1-N16, 16 MB flash) with a dual-app OTA layout.
;
; Build:   pio run
; Upload:  pio run -t upload
; Monitor: pio device monitor
; FS:      pio run -t uploadfs
;
; Board id: esp32-c6-devkitc-1 — WireClaw's proven/tested C6 target. The DORHEA
; "ESP32-C6-WROOM-1-N16" dev board uses the same ESP32-C6-WROOM-1 module; we
; override the flash size to 16 MB and use a dual-app OTA partition table
; (partitions.csv). This intentionally differs from WireClaw's upstream defaults
; (4 MB flash, single-app table) to match the on-hand N16 board — see
; src/wireclaw/VENDOR.md and the TC-0002 from_code report.

[platformio]
default_envs = esp32-c6

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
board_build.filesystem = littlefs
board_build.partitions = partitions.csv
monitor_speed = 115200
monitor_filters = colorize, time

[env:esp32-c6]
board = esp32-c6-devkitc-1
; on-hand board is the N16 (16 MB flash); override the board default
board_upload.flash_size = 16MB
board_build.flash_size = 16MB
; Route Arduino `Serial` to the C6's native USB-Serial-JTAG (HWCDC) so the serial
; console is visible on the same USB port used for flashing. Without this the C6
; defaults Serial to UART0 (the board's separate "UART" connector). See docs/BUILD.md.
; Both flags are required for the C6: CDC_ON_BOOT alone selects the TinyUSB `USBSerial`
; object (which the C6 lacks -> build error); USB_MODE=1 selects the hardware
; `HWCDCSerial` (the USB-Serial-JTAG), which is what the C6 actually has.
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
; NOTE: upload_port/monitor_port below are inherited placeholders — on Windows the
; real port is pinned per-command (e.g. --upload-port COM3). See docs/BUILD.md.
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
